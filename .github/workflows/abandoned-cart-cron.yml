name: Abandoned Cart Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call production abandoned-cart cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is missing."
            exit 1
          fi

          response_code=$(curl -sS -o /tmp/abandoned-cart-cron-response.txt -w "%{http_code}" \
            -X POST "https://courtlane.us/api/cart-abandonment-cron" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response_code"
          echo "Response body:"
          cat /tmp/abandoned-cart-cron-response.txt

          if [ "$response_code" -lt 200 ] || [ "$response_code" -ge 300 ]; then
            echo "Cron endpoint call failed."
            exit 1
          fi

